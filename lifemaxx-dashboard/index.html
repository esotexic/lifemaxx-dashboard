<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lifemaxx</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #f0ede8;
      --muted: #6b6860;
      --accent-green: #1fce8f;
      --accent-amber: #f0a500;
      --accent-red: #ff4d4d;
      --accent-blue: #4d9fff;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 100; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2rem 2.5rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; color: var(--text); }
    .logo span { color: var(--accent-green); }
    .header-right { display: flex; align-items: center; gap: 1.5rem; }
    .last-updated { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
    .refresh-btn {
      font-family: var(--font-mono); font-size: 11px; padding: 7px 16px;
      border: 1px solid var(--border2); background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em;
    }
    .refresh-btn:hover { border-color: var(--accent-green); color: var(--accent-green); }
    .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

    .main { padding: 2rem 2.5rem; max-width: 1400px; }

    /* TOP METRIC STRIP */
    .metric-strip {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1px; background: var(--border); border: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .metric-cell {
      background: var(--surface); padding: 1.25rem 1.5rem;
    }
    .metric-cell .label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .metric-cell .value { font-size: 32px; font-weight: 800; line-height: 1; }
    .metric-cell .sub { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 5px; }
    .green { color: var(--accent-green); }
    .amber { color: var(--accent-amber); }
    .red { color: var(--accent-red); }
    .blue { color: var(--accent-blue); }

    /* PILLARS */
    .pillars { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    @media (max-width: 1000px) { .pillars { grid-template-columns: 1fr; } }

    .pillar {
      background: var(--surface); border: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .pillar-header {
      display: flex; align-items: center; gap: 10px;
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
    }
    .pillar-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .pillar-title { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); }
    .pillar-body { padding: 1.25rem; flex: 1; display: flex; flex-direction: column; gap: 1rem; }

    /* STAT ROWS */
    .stat-row { display: flex; align-items: center; justify-content: space-between; }
    .stat-label { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
    .stat-val { font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--text); }

    /* PROGRESS BAR */
    .prog-wrap { margin-top: 4px; }
    .prog-label { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .prog-label span { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
    .prog-bg { height: 3px; background: var(--surface2); width: 100%; }
    .prog-fill { height: 3px; transition: width 1s cubic-bezier(0.4,0,0.2,1); }

    /* TAGS */
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .tag {
      font-family: var(--font-mono); font-size: 10px; padding: 4px 10px;
      border: 1px solid; letter-spacing: 0.05em;
    }
    .tag.upper { border-color: rgba(77,159,255,0.4); color: var(--accent-blue); }
    .tag.lower { border-color: rgba(31,206,143,0.4); color: var(--accent-green); }
    .tag.cardio { border-color: rgba(240,165,0,0.4); color: var(--accent-amber); }
    .tag.rest { border-color: rgba(107,104,96,0.4); color: var(--muted); }

    /* LIST ITEMS */
    .list-item {
      display: flex; gap: 10px; padding: 8px 0;
      border-bottom: 1px solid var(--border); font-size: 12px; line-height: 1.5;
    }
    .list-item:last-child { border-bottom: none; padding-bottom: 0; }
    .list-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }

    /* CHART AREA */
    .chart-section {
      background: var(--surface); border: 1px solid var(--border); padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .chart-title { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
    .chart-legend { display: flex; gap: 16px; }
    .chart-legend span { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
    .leg-sq { width: 10px; height: 3px; }
    .chart-wrap { position: relative; width: 100%; height: 200px; }

    /* TODO COMPLETION SECTION */
    .todo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    @media (max-width: 700px) { .todo-grid { grid-template-columns: 1fr; } }

    /* DIVIDER */
    .divider { height: 1px; background: var(--border); margin: 0.5rem 0; }

    /* SCORE BADGE */
    .score-badge { font-size: 42px; font-weight: 800; line-height: 1; }

    /* SKELETON */
    .skeleton { background: var(--surface2); animation: pulse 1.5s ease-in-out infinite; border-radius: 2px; }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }

    /* ERROR */
    .error-msg { font-family: var(--font-mono); font-size: 12px; color: var(--accent-red); padding: 1rem; border: 1px solid rgba(255,77,77,0.2); }

    .fade-in { animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div class="grain"></div>

  <header>
    <div class="logo">life<span>maxx</span></div>
    <div class="header-right">
      <span class="last-updated" id="lastUpdated">fetching data...</span>
      <button class="refresh-btn" id="refreshBtn" onclick="loadDashboard()">↺ refresh</button>
    </div>
  </header>

  <div class="main" id="dashboard">
    <div style="padding:3rem 0;text-align:center;">
      <div class="skeleton" style="height:16px;width:200px;margin:0 auto 12px;"></div>
      <div class="skeleton" style="height:12px;width:140px;margin:0 auto;"></div>
    </div>
  </div>

  <script>
    let perfChart = null;
    let todoChart = null;

    async function loadDashboard() {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('loading');
      btn.textContent = '↺ loading...';

      try {
        const [eodRes, todoRes] = await Promise.all([
          fetch('/api/eod'),
          fetch('/api/todos')
        ]);

        const eod = eodRes.ok ? await eodRes.json() : { entries: [] };
   const todos = todoRes.ok ? await todoRes.json() : { pages: [] };
    

        renderDashboard(eod, todos);
        document.getElementById('lastUpdated').textContent = 'updated ' + new Date().toLocaleTimeString();
      } catch(e) {
        document.getElementById('dashboard').innerHTML = `<div class="error-msg">⚠ Could not load data. Check your NOTION_TOKEN in Vercel environment variables.<br><br>${e.message}</div>`;
      }

      btn.classList.remove('loading');
      btn.textContent = '↺ refresh';
    }

    function scoreColor(n) {
      if (n >= 7) return 'green';
      if (n >= 5) return 'amber';
      return 'red';
    }

    function trainTag(t) {
      if (!t) return '<span class="tag rest">rest</span>';
      const l = t.toLowerCase();
      if (l.includes('upper')) return '<span class="tag upper">upper</span>';
      if (l.includes('lower')) return '<span class="tag lower">lower</span>';
      if (l.includes('cardio')) return '<span class="tag cardio">cardio</span>';
      if (l.includes('rest') || l.includes('off')) return '<span class="tag rest">rest</span>';
      return `<span class="tag upper">${t}</span>`;
    }

    function avg(arr) {
      if (!arr.length) return 0;
      return Math.round((arr.reduce((a,b) => a+b, 0) / arr.length) * 10) / 10;
    }

    function renderDashboard(eod, todos) {
      const days = eod.entries || [];
      const todoPages = todos.pages || [];

      // compute metrics
      const moods = days.map(d => d.mood).filter(Boolean);
      const perfs = days.map(d => d.performance).filter(Boolean);
      const bodyFeels = days.map(d => d.bodyFeel).filter(Boolean);
      const avgMood = avg(moods);
      const avgPerf = avg(perfs);
      const avgBody = avg(bodyFeels);
      const trainDays = days.filter(d => d.trained && !d.trained.toLowerCase().includes('rest')).length;
      const eatClean = days.filter(d => d.ateClean === true).length;
      const eatPct = days.length ? Math.round((eatClean / days.length) * 100) : 0;

     let totalTasks = todos.totalTasks || 0;
let doneTasks = todos.doneTasks || 0;
if (!totalTasks) { todoPages.forEach(p => { totalTasks += p.total||0; doneTasks += p.done||0; }); }
const completionPct = totalTasks ? Math.round((doneTasks / totalTasks) * 100) : 0;
      
      // recent EOD data for charts
      const recentDays = days.slice(-7);
      const chartLabels = recentDays.map(d => d.date ? d.date.slice(5) : '');
      const chartMood = recentDays.map(d => d.mood || null);
      const chartPerf = recentDays.map(d => d.performance || null);

      // latest entry
      const latest = days[days.length - 1] || {};
      const wins = days.flatMap(d => d.winsToday ? [d.winsToday] : []).slice(-5);
      const blockers = days.flatMap(d => d.bottleneck ? [d.bottleneck] : []).slice(-3);
      const needles = days.flatMap(d => d.needleMover ? [d.needleMover] : []).slice(-3);

      // todo pages for list
      const recentTodos = todoPages.slice(-5);

      const html = `
        <div class="metric-strip fade-in">
          <div class="metric-cell">
            <div class="label">avg mood</div>
            <div class="value ${scoreColor(avgMood)}">${avgMood || '—'}</div>
            <div class="sub">/ 10 — ${days.length} days</div>
          </div>
          <div class="metric-cell">
            <div class="label">avg performance</div>
            <div class="value ${scoreColor(avgPerf)}">${avgPerf || '—'}</div>
            <div class="sub">/ 10</div>
          </div>
          <div class="metric-cell">
            <div class="label">body feel</div>
            <div class="value ${scoreColor(avgBody)}">${avgBody || '—'}</div>
            <div class="sub">avg / 10</div>
          </div>
          <div class="metric-cell">
            <div class="label">training days</div>
            <div class="value ${trainDays >= 4 ? 'green' : trainDays >= 2 ? 'amber' : 'red'}">${trainDays}</div>
            <div class="sub">of ${days.length} logged</div>
          </div>
          <div class="metric-cell">
            <div class="label">eating clean</div>
            <div class="value ${eatPct >= 70 ? 'green' : eatPct >= 40 ? 'amber' : 'red'}">${eatPct}%</div>
            <div class="sub">${eatClean}/${days.length} days</div>
          </div>
          <div class="metric-cell">
            <div class="label">tasks done</div>
            <div class="value ${completionPct >= 70 ? 'green' : completionPct >= 40 ? 'amber' : 'red'}">${completionPct}%</div>
            <div class="sub">${doneTasks}/${totalTasks} total</div>
          </div>
        </div>

        <div class="chart-section fade-in">
          <div class="chart-header">
            <span class="chart-title">mood & performance trend</span>
            <div class="chart-legend">
              <span><span class="leg-sq" style="background:var(--accent-blue)"></span>mood</span>
              <span><span class="leg-sq" style="background:var(--accent-green)"></span>performance</span>
            </div>
          </div>
          <div class="chart-wrap"><canvas id="perfChart" role="img" aria-label="Line chart of mood and performance scores over time"></canvas></div>
        </div>

        <div class="pillars fade-in">
          <!-- FITNESS -->
          <div class="pillar">
            <div class="pillar-header">
              <div class="pillar-dot" style="background:var(--accent-blue)"></div>
              <span class="pillar-title">fitness</span>
            </div>
            <div class="pillar-body">
              <div>
                <div class="stat-label" style="margin-bottom:8px;">training log</div>
                <div class="tag-row">${days.map(d => trainTag(d.trained)).join('') || '<span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">no data</span>'}</div>
              </div>
              <div class="divider"></div>
              <div class="stat-row"><span class="stat-label">avg body feel</span><span class="stat-val ${scoreColor(avgBody)}">${avgBody}/10</span></div>
              <div class="stat-row"><span class="stat-label">eating clean</span><span class="stat-val ${eatPct >= 70 ? 'green' : 'red'}">${eatPct}%</span></div>
              <div class="stat-row"><span class="stat-label">today's training</span><span class="stat-val">${latest.trained || '—'}</span></div>
              <div class="divider"></div>
              <div>
                <div class="stat-label" style="margin-bottom:8px;">clean eating progress</div>
                <div class="prog-wrap">
                  <div class="prog-label"><span>0%</span><span>${eatPct}%</span><span>100%</span></div>
                  <div class="prog-bg"><div class="prog-fill" style="width:${eatPct}%;background:${eatPct >= 70 ? 'var(--accent-green)' : eatPct >= 40 ? 'var(--accent-amber)' : 'var(--accent-red)'}"></div></div>
                </div>
              </div>
            </div>
          </div>

          <!-- WORK -->
          <div class="pillar">
            <div class="pillar-header">
              <div class="pillar-dot" style="background:var(--accent-amber)"></div>
              <span class="pillar-title">work</span>
            </div>
            <div class="pillar-body">
              <div>
                <div class="stat-label" style="margin-bottom:6px;">today's priority</div>
                <div style="font-size:12px;line-height:1.6;color:var(--text);">${latest.tomorrow || '—'}</div>
              </div>
              <div class="divider"></div>
              <div>
                <div class="stat-label" style="margin-bottom:8px;">needle movers</div>
                ${needles.map(w => `<div class="list-item"><div class="list-dot" style="background:var(--accent-amber)"></div><span style="color:var(--text)">${w}</span></div>`).join('') || '<div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">no data yet</div>'}
              </div>
              <div class="divider"></div>
              <div>
                <div class="stat-label" style="margin-bottom:8px;">blockers</div>
                ${blockers.map(b => `<div class="list-item"><div class="list-dot" style="background:var(--accent-red)"></div><span style="color:var(--muted)">${b}</span></div>`).join('') || '<div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">none logged</div>'}
              </div>
            </div>
          </div>

          <!-- PERSONAL -->
          <div class="pillar">
            <div class="pillar-header">
              <div class="pillar-dot" style="background:var(--accent-green)"></div>
              <span class="pillar-title">personal</span>
            </div>
            <div class="pillar-body">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div>
                  <div class="stat-label" style="margin-bottom:4px;">mood today</div>
                  <div class="score-badge ${scoreColor(latest.mood)}">${latest.mood || '—'}</div>
                </div>
                <div>
                  <div class="stat-label" style="margin-bottom:4px;">performance</div>
                  <div class="score-badge ${scoreColor(latest.performance)}">${latest.performance || '—'}</div>
                </div>
              </div>
              <div class="divider"></div>
              <div>
                <div class="stat-label" style="margin-bottom:8px;">wins</div>
                ${wins.map(w => `<div class="list-item"><div class="list-dot" style="background:var(--accent-green)"></div><span style="color:var(--text)">${w}</span></div>`).join('') || '<div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">no data yet</div>'}
              </div>
            </div>
          </div>
        </div>

        <!-- TODO SECTION -->
        <div class="chart-section fade-in" style="margin-top:1rem;">
          <div class="chart-header">
            <span class="chart-title">to-do execution</span>
            <span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">${doneTasks} done / ${totalTasks} total</span>
          </div>
          <div class="todo-grid">
            <div>
              <div style="margin-bottom:1rem;">
                ${recentTodos.map(p => {
                  const pct = p.total ? Math.round((p.done/p.total)*100) : 0;
                  return `
                  <div style="margin-bottom:12px;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                      <span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">${p.date || 'undated'}</span>
                      <span style="font-family:var(--font-mono);font-size:11px;color:${pct>=70?'var(--accent-green)':pct>=40?'var(--accent-amber)':'var(--accent-red)'}">${p.done}/${p.total}</span>
                    </div>
                    <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${pct>=70?'var(--accent-green)':pct>=40?'var(--accent-amber)':'var(--accent-red)'}"></div></div>
                  </div>`;
                }).join('') || '<div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">no to-do pages found</div>'}
              </div>
            </div>
            <div style="display:flex;flex-direction:column;justify-content:center;gap:1rem;">
              <div style="text-align:center;">
                <div class="stat-label" style="margin-bottom:6px;">overall completion</div>
                <div style="font-size:52px;font-weight:800;color:${completionPct>=70?'var(--accent-green)':completionPct>=40?'var(--accent-amber)':'var(--accent-red)'}">${completionPct}<span style="font-size:20px;color:var(--muted)">%</span></div>
              </div>
              <div class="prog-bg" style="height:4px;">
                <div class="prog-fill" style="width:${completionPct}%;height:4px;background:${completionPct>=70?'var(--accent-green)':completionPct>=40?'var(--accent-amber)':'var(--accent-red)'}"></div>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('dashboard').innerHTML = html;

      // Draw performance chart
      if (perfChart) perfChart.destroy();
      const ctx = document.getElementById('perfChart');
      if (ctx && chartLabels.length) {
        perfChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: chartLabels,
            datasets: [
              {
                label: 'Mood', data: chartMood, borderColor: '#4d9fff',
                backgroundColor: 'rgba(77,159,255,0.06)', fill: true,
                tension: 0.4, pointRadius: 4, pointBackgroundColor: '#4d9fff',
                borderDash: [], borderWidth: 2
              },
              {
                label: 'Performance', data: chartPerf, borderColor: '#1fce8f',
                backgroundColor: 'rgba(31,206,143,0.06)', fill: true,
                tension: 0.4, pointRadius: 4, pointBackgroundColor: '#1fce8f',
                borderDash: [5,4], borderWidth: 2
              }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            spanGaps: true,
            plugins: { legend: { display: false } },
            scales: {
              y: {
                min: 0, max: 10,
                ticks: { stepSize: 2, font: { size: 10, family: 'DM Mono' }, color: '#6b6860' },
                grid: { color: 'rgba(255,255,255,0.04)' }, border: { display: false }
              },
              x: {
                ticks: { font: { size: 10, family: 'DM Mono' }, color: '#6b6860', autoSkip: false, maxRotation: 0 },
                grid: { display: false }, border: { display: false }
              }
            }
          }
        });
      }
    }

    loadDashboard();
  </script>
</body>
</html>
